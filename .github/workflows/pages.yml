name: Deploy web demo to GitHub Pages

# Build the wasm/browser app with trunk and publish it to GitHub Pages.
# Project site, so assets are served under /<repo>/ — set --public-url to match.
on:
  push:
    branches: [main]
    # Don't rebuild/redeploy for docs-only changes.
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  TRUNK_VERSION: "0.21.14"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache the cargo registry + target dir (wgpu/eframe/molar are slow to build).
      - uses: Swatinem/rust-cache@v2

      # Enable Pages (source = GitHub Actions) via the API if it isn't already, so
      # no manual repo-settings step is needed for the first deploy.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install trunk
        run: |
          curl -fsSL "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xzf - -C "$HOME/.cargo/bin"

      # Release build (wasm-opt -Oz via the index.html data-wasm-opt attr). The
      # public URL must be the repo subpath so the injected JS/wasm resolve on
      # Pages (https://<owner>.github.io/molar_vis/).
      - name: Build
        working-directory: crates/molar_vis_web
        run: trunk build --release --public-url "/${GITHUB_REPOSITORY#*/}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/molar_vis_web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
