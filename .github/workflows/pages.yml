name: Deploy web demo to GitHub Pages

# Build the embeddable JavaScript module (`molar_vis_js`) with wasm-pack and publish a
# demo page that drives the viewer through that public JS API, to GitHub Pages.
# wasm-pack `--target web` emits an ES module with relative imports, so it resolves under
# the project subpath (https://<owner>.github.io/molar_vis/) with no public-url rewrite.
# Only deploys on a pushed **version tag** (e.g. v0.1.0), so day-to-day commits to main
# don't redeploy; `workflow_dispatch` still allows a manual redeploy.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  WASM_PACK_VERSION: "0.13.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache the cargo registry + target dir (wgpu/eframe/molar are slow to build).
      - uses: Swatinem/rust-cache@v2

      # Enable Pages (source = GitHub Actions) via the API if it isn't already, so
      # no manual repo-settings step is needed for the first deploy.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install wasm-pack
        run: |
          curl -fsSL "https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - --strip-components=1 -C "$HOME/.cargo/bin" \
              "wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack"

      # Emit the importable ES module into crates/molar_vis_js/web/pkg/ (next to the
      # demo's index.html, which imports `./pkg/molar_vis.js`).
      - name: Build JS module
        run: wasm-pack build crates/molar_vis_js --target web --release --out-dir web/pkg

      # Assemble the Pages site: the demo page + its pkg/ module + the bundled structure
      # the demo fetches.
      - name: Assemble dist
        run: |
          mkdir -p dist
          cp crates/molar_vis_js/web/index.html dist/
          cp -r crates/molar_vis_js/web/pkg dist/pkg
          cp tests/2lao.pdb dist/2lao.pdb

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
